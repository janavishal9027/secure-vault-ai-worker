# nginx location snippet for the ai-worker service.
#
# Dropped into /etc/nginx/snippets/${KUBE_NAMESPACE}/ on the VPS by
# ci/deploy-remote.sh. The host's parent server block includes
# /etc/nginx/snippets/<cluster>/*.location.conf, so this snippet is
# picked up automatically when nginx reloads.
#
# /ai-worker/* beats the UI's catch-all "/" by most-specific match, so
# /ai-worker/summarize lands here. Traefik (inside the LXD container)
# strips the /ai-worker prefix via its StripPrefix middleware before
# forwarding to the pod, which exposes /summarize at the root.
#
# ${LXD_BRIDGE_IP} is substituted at deploy time by ci/deploy.sh — it's
# the IP of the cluster's LXD container on lxdbr0, where Traefik
# listens on :80.
location /ai-worker/ {
    proxy_pass         http://${LXD_BRIDGE_IP}:80;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # Summarization of long notes fans out to Gemini in parallel
    # chunks — end-to-end latency can hit ~30s for a multi-thousand-
    # char note. Generous read timeout so the host proxy doesn't cut
    # the request mid-stream.
    proxy_read_timeout 180s;
    proxy_send_timeout 60s;

    # Summary request bodies are small JSON payloads, but keep the
    # cap loose so an unusually long note body doesn't 413 at the
    # edge.
    client_max_body_size 10M;
}
