apiVersion: v1
kind: Service
metadata:
  name: ${APP_NAME}-service
  labels:
    app: ${APP_NAME}
spec:
  type: ClusterIP
  selector:
    app: ${APP_NAME}
  ports:
    - protocol: TCP
      # Cluster-internal callers (notes service's SummaryRequestConsumer,
      # which POSTs to /summarize) reach this on port 8000 — matches
      # AI_WORKER_BASE_URL in the notes deployment env.
      port: 8000
      targetPort: 8000
